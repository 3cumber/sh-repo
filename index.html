<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Shawarma Compass</title>
<style>
  :root {
    --bg: #f2f2f7;
    --bg-grad-1: #fbe9d2;
    --bg-grad-2: #f2f2f7;
    --elev: rgba(255,255,255,0.7);
    --card: #ffffff;
    --text: #1c1c1e;
    --text-2: #8a8a8e;
    --sep: rgba(60,60,67,0.12);
    --accent: #ff8a00;
    --accent-soft: rgba(255,138,0,0.14);
    --tick: rgba(60,60,67,0.28);
    --tick-major: rgba(60,60,67,0.55);
    --rose-text: rgba(60,60,67,0.7);
    --green: #34c759;
    --shadow: 0 10px 40px rgba(0,0,0,0.08);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000000;
      --bg-grad-1: #2a1c08;
      --bg-grad-2: #000000;
      --elev: rgba(28,28,30,0.72);
      --card: #1c1c1e;
      --text: #ffffff;
      --text-2: #98989f;
      --sep: rgba(84,84,88,0.4);
      --accent: #ff9f0a;
      --accent-soft: rgba(255,159,10,0.18);
      --tick: rgba(235,235,245,0.28);
      --tick-major: rgba(235,235,245,0.6);
      --rose-text: rgba(235,235,245,0.78);
      --green: #30d158;
      --shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro",system-ui,sans-serif;
    background:
      radial-gradient(120% 80% at 50% -10%, var(--bg-grad-1) 0%, var(--bg-grad-2) 55%) fixed,
      var(--bg);
    color:var(--text);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    overflow:hidden;
    user-select:none;
    -webkit-user-select:none;
  }

  .app { height:100dvh; display:flex; flex-direction:column; }
  .view {
    flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
    padding: max(env(safe-area-inset-top), 16px) 20px 120px;
    display:none;
    animation:fade .35s ease both;
  }
  .view.active { display:block; }
  @keyframes fade { from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;} }

  .nav-title { font-size:34px; font-weight:800; letter-spacing:-0.02em; margin: 8px 0 18px; }
  .nav-title .sub { display:block; font-size:15px; font-weight:500; color:var(--text-2); letter-spacing:0; margin-top:4px; }

  /* ---------- Compass ---------- */
  .compass-wrap { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:calc(100dvh - 200px); gap:6px; }
  .dial { position:relative; width:min(82vw,340px); aspect-ratio:1; display:grid; place-items:center; }
  .rose {
    position:absolute; inset:0; border-radius:50%;
    transition: transform .12s linear;
    will-change:transform;
  }
  .rose svg { width:100%; height:100%; display:block; }
  .dial-glass {
    position:absolute; inset:10%; border-radius:50%;
    background: radial-gradient(70% 70% at 50% 30%, rgba(255,255,255,0.06), rgba(0,0,0,0.04));
    box-shadow: inset 0 1px 2px rgba(255,255,255,0.18), inset 0 -10px 30px rgba(0,0,0,0.06), var(--shadow);
    backdrop-filter: blur(2px);
  }
  /* fixed heading marker at very top */
  .heading-mark {
    position:absolute; top:-2px; left:50%; transform:translateX(-50%);
    width:0; height:0; border-left:9px solid transparent; border-right:9px solid transparent;
    border-top:14px solid var(--accent); z-index:5;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
  }
  /* the arrow pointing to the shawarma */
  .needle {
    position:absolute; inset:0; display:grid; place-items:center;
    transition: transform .12s linear; will-change:transform; z-index:4;
  }
  .needle .arrow {
    width:18px; height:46%;
    transform-origin:center bottom;
    transform:translateY(-50%);
    position:relative;
  }
  .needle .arrow::before {
    content:""; position:absolute; top:0; left:50%; transform:translateX(-50%);
    width:0; height:0; border-left:11px solid transparent; border-right:11px solid transparent;
    border-bottom:22px solid var(--accent);
    filter: drop-shadow(0 3px 6px rgba(255,138,0,0.4));
  }
  .needle .arrow::after {
    content:""; position:absolute; top:20px; left:50%; transform:translateX(-50%);
    width:5px; height:calc(100% - 22px); border-radius:3px;
    background:linear-gradient(var(--accent), transparent);
    opacity:.55;
  }
  .center-read { position:absolute; inset:0; display:grid; place-items:center; text-align:center; z-index:3; pointer-events:none; }
  .center-read .dist { font-size:40px; font-weight:800; letter-spacing:-0.03em; font-variant-numeric:tabular-nums; }
  .center-read .unit { font-size:16px; font-weight:600; color:var(--text-2); margin-top:-2px; }

  .target-name {
    margin-top:14px; font-size:22px; font-weight:700; letter-spacing:-0.01em; min-height:28px;
    transition: color .3s;
  }
  .target-name.masked { color:var(--text-2); letter-spacing:0.12em; }
  .target-name.insight { color:var(--accent); }
  .target-sub { font-size:14px; color:var(--text-2); margin-top:2px; min-height:18px; }

  .insight-badge {
    display:inline-flex; align-items:center; gap:6px; margin-top:14px;
    padding:7px 14px; border-radius:100px; font-size:13px; font-weight:600;
    background:var(--accent-soft); color:var(--accent);
    opacity:0; transform:scale(.9); transition:.3s;
  }
  .insight-badge.show { opacity:1; transform:scale(1); }
  .insight-badge .dot { width:8px; height:8px; border-radius:50%; background:var(--accent); animation:pulse 1.6s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.3;} }

  .actions { display:flex; gap:10px; margin-top:22px; width:min(82vw,340px); }
  .btn {
    flex:1; border:none; border-radius:15px; padding:15px 16px; font-size:16px; font-weight:600;
    font-family:inherit; cursor:pointer; transition:transform .12s, opacity .2s; color:#fff;
    background:var(--accent);
  }
  .btn:active { transform:scale(0.96); }
  .btn.secondary { background:var(--card); color:var(--text); box-shadow:var(--shadow); }
  .btn:disabled { opacity:0.4; cursor:default; }

  .enable-card {
    width:min(86vw,360px); background:var(--card); border-radius:22px; padding:26px 22px;
    box-shadow:var(--shadow); text-align:center;
  }
  .enable-card h2 { font-size:21px; font-weight:700; letter-spacing:-0.01em; }
  .enable-card p { color:var(--text-2); font-size:15px; line-height:1.45; margin:10px 0 20px; }

  .status-line { font-size:13px; color:var(--text-2); margin-top:18px; text-align:center; max-width:300px; line-height:1.4; }

  /* ---------- Lists / cards ---------- */
  .group { background:var(--card); border-radius:18px; box-shadow:var(--shadow); overflow:hidden; margin-bottom:18px; }
  .row { display:flex; align-items:center; gap:14px; padding:15px 18px; border-bottom:1px solid var(--sep); }
  .row:last-child { border-bottom:none; }
  .row .leading { width:42px; height:42px; border-radius:12px; display:grid; place-items:center; flex-shrink:0; font-size:20px; background:var(--accent-soft); }
  .row .body { flex:1; min-width:0; }
  .row .body .t { font-size:16px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .row .body .s { font-size:13px; color:var(--text-2); margin-top:2px; }
  .row .trail { color:var(--text-2); font-size:14px; flex-shrink:0; }
  .stars { color:var(--accent); font-size:14px; letter-spacing:1px; }

  .empty { text-align:center; color:var(--text-2); padding:60px 20px; font-size:15px; line-height:1.5; }
  .empty .big { font-size:40px; margin-bottom:12px; }

  /* badges grid */
  .badges { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
  .badge { background:var(--card); border-radius:18px; padding:18px 10px; text-align:center; box-shadow:var(--shadow); transition:.3s; }
  .badge .ic { font-size:34px; filter:grayscale(1); opacity:.35; transition:.3s; }
  .badge.on .ic { filter:none; opacity:1; }
  .badge .name { font-size:12px; font-weight:600; margin-top:8px; line-height:1.2; }
  .badge.on .name { color:var(--text); }
  .badge:not(.on) .name { color:var(--text-2); }
  .badge .desc { font-size:10px; color:var(--text-2); margin-top:3px; line-height:1.25; }

  /* ---------- Tab bar ---------- */
  .tabbar {
    position:fixed; bottom:0; left:0; right:0; z-index:50;
    display:flex; padding: 8px 12px max(env(safe-area-inset-bottom),10px);
    background:var(--elev); backdrop-filter:saturate(180%) blur(24px); -webkit-backdrop-filter:saturate(180%) blur(24px);
    border-top:1px solid var(--sep);
  }
  .tab { flex:1; background:none; border:none; font-family:inherit; cursor:pointer; color:var(--text-2);
    display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 0; font-size:10px; font-weight:600; transition:color .2s; }
  .tab.active { color:var(--accent); }
  .tab svg { width:25px; height:25px; }
  .tab:active { opacity:.6; }

  /* ---------- Sheet ---------- */
  .sheet-bg { position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:100; opacity:0; pointer-events:none; transition:.3s; }
  .sheet-bg.show { opacity:1; pointer-events:auto; }
  .sheet {
    position:fixed; left:0; right:0; bottom:0; z-index:101; background:var(--card);
    border-radius:22px 22px 0 0; padding:10px 22px max(env(safe-area-inset-bottom),24px);
    transform:translateY(100%); transition:transform .35s cubic-bezier(.32,.72,0,1);
    max-height:88dvh; overflow-y:auto;
  }
  .sheet.show { transform:none; }
  .grabber { width:38px; height:5px; border-radius:3px; background:var(--sep); margin:6px auto 16px; }
  .sheet h3 { font-size:22px; font-weight:800; letter-spacing:-0.02em; }
  .sheet .sh-sub { color:var(--text-2); font-size:14px; margin:4px 0 18px; }
  .rate { display:flex; justify-content:center; gap:8px; margin:8px 0 20px; }
  .rate span { font-size:38px; cursor:pointer; filter:grayscale(1); opacity:.35; transition:.15s; }
  .rate span.lit { filter:none; opacity:1; transform:scale(1.05); }
  textarea {
    width:100%; min-height:96px; border:1px solid var(--sep); border-radius:14px; padding:14px;
    font-family:inherit; font-size:16px; background:var(--bg); color:var(--text); resize:none; outline:none;
  }
  input[type=text] {
    width:100%; border:1px solid var(--sep); border-radius:14px; padding:14px; margin-bottom:14px;
    font-family:inherit; font-size:16px; background:var(--bg); color:var(--text); outline:none;
  }
  label.fld { display:block; font-size:13px; font-weight:600; color:var(--text-2); margin:0 0 6px 4px; }

  .toast {
    position:fixed; left:50%; bottom:96px; transform:translateX(-50%) translateY(20px); z-index:200;
    background:var(--text); color:var(--bg); padding:12px 20px; border-radius:100px; font-size:14px; font-weight:600;
    opacity:0; pointer-events:none; transition:.3s; box-shadow:var(--shadow); max-width:88vw; text-align:center;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">

  <!-- COMPASS -->
  <section class="view active" id="view-compass">
    <div class="compass-wrap" id="compass-wrap">
      <!-- enable card injected when needed -->
    </div>
  </section>

  <!-- VISITED -->
  <section class="view" id="view-visited">
    <h1 class="nav-title">Visited<span class="sub">Your shawarma trail</span></h1>
    <div id="visited-list"></div>
  </section>

  <!-- AWARDS -->
  <section class="view" id="view-awards">
    <h1 class="nav-title">Awards<span class="sub" id="awards-count"></span></h1>
    <div class="badges" id="badges"></div>
  </section>

  <!-- TAB BAR -->
  <nav class="tabbar">
    <button class="tab active" data-view="compass">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><polygon points="15.5,8.5 10.5,10.5 8.5,15.5 13.5,13.5" fill="currentColor" stroke="none"/></svg>
      Compass
    </button>
    <button class="tab" data-view="visited">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 21s-7-5.5-7-11a7 7 0 0 1 14 0c0 5.5-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>
      Visited
    </button>
    <button class="tab" data-view="awards">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="9" r="5"/><path d="M9 13.5 7.5 21 12 18.5 16.5 21 15 13.5"/></svg>
      Awards
    </button>
  </nav>
</div>

<!-- REVIEW SHEET -->
<div class="sheet-bg" id="sheet-bg"></div>
<div class="sheet" id="sheet"></div>

<div class="toast" id="toast"></div>

<script>
"use strict";

/* ============ config ============ */
const REVEAL_M = 30;          // "in sight" radius in metres
const SEARCH_RADIUS_M = 5000; // overpass search radius
const OVERPASS = [
  "https://overpass-api.de/api/interpreter",
  "https://overpass.kumi.systems/api/interpreter",
  "https://maps.mail.ru/osm/tools/overpass/api/interpreter"
];

/* ============ safe storage (works deployed, degrades in sandbox) ============ */
const Store = (() => {
  let ok = false, mem = {};
  try { localStorage.setItem("__t","1"); localStorage.removeItem("__t"); ok = true; } catch(e){ ok = false; }
  return {
    get(k, def){ try { const v = ok ? localStorage.getItem(k) : mem[k]; return v==null ? def : JSON.parse(v); } catch(e){ return def; } },
    set(k, v){ const s = JSON.stringify(v); try { if(ok) localStorage.setItem(k,s); else mem[k]=s; } catch(e){ mem[k]=s; } }
  };
})();

/* ============ state ============ */
const state = {
  pos: null,            // {lat, lon, acc}
  heading: null,        // degrees from north, clockwise
  candidates: [],       // {id, name, lat, lon, source}
  target: null,
  visited: Store.get("visited", {}),   // id -> {name, lat, lon, ts}
  reviews: Store.get("reviews", {}),   // id -> {stars, text, ts}
  manual: Store.get("manual", []),     // [{id,name,lat,lon,source:'manual'}]
  loaded: false,
  fetching: false
};

/* ============ geo math ============ */
const toR = d => d*Math.PI/180, toD = r => r*180/Math.PI;
function distM(a,b,c,d){
  const R=6371000, p1=toR(a), p2=toR(c), dp=toR(c-a), dl=toR(d-b);
  const x=Math.sin(dp/2)**2 + Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;
  return 2*R*Math.asin(Math.sqrt(x));
}
function bearing(a,b,c,d){
  const dl=toR(d-b), y=Math.sin(dl)*Math.cos(toR(c));
  const x=Math.cos(toR(a))*Math.sin(toR(c)) - Math.sin(toR(a))*Math.cos(toR(c))*Math.cos(dl);
  return (toD(Math.atan2(y,x))+360)%360;
}
function fmtDist(m){
  if(m==null) return ["–",""];
  if(m < 1000) return [Math.round(m).toString(), "metres"];
  return [(m/1000).toFixed(m<10000?1:0), "km"];
}

/* ============ rose svg ============ */
function buildRose(){
  const C=200, R=190; let s='';
  for(let i=0;i<72;i++){
    const ang=i*5, major=(ang%30===0);
    const a=toR(ang-90), x1=C+Math.cos(a)*R, y1=C+Math.sin(a)*R;
    const len=major?22:11, x2=C+Math.cos(a)*(R-len), y2=C+Math.sin(a)*(R-len);
    s+=`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="var(--${major?'tick-major':'tick'})" stroke-width="${major?2:1.4}" stroke-linecap="round"/>`;
  }
  const card=[["N",0],["E",90],["S",180],["W",270]];
  card.forEach(([t,ang])=>{
    const a=toR(ang-90), r=R-46, x=C+Math.cos(a)*r, y=C+Math.sin(a)*r;
    s+=`<text x="${x.toFixed(1)}" y="${y.toFixed(1)}" text-anchor="middle" dominant-baseline="central" font-size="26" font-weight="700" fill="${t==='N'?'var(--accent)':'var(--rose-text)'}">${t}</text>`;
  });
  return `<svg viewBox="0 0 400 400">${s}</svg>`;
}

/* ============ DOM refs ============ */
const $ = id => document.getElementById(id);
const wrap = $("compass-wrap");
let rose, needle, distEl, unitEl, nameEl, subEl, badgeEl, mapBtn;

function renderCompassChrome(){
  wrap.innerHTML = `
    <div class="dial">
      <div class="heading-mark"></div>
      <div class="rose" id="rose">${buildRose()}</div>
      <div class="dial-glass"></div>
      <div class="needle" id="needle"><div class="arrow"></div></div>
      <div class="center-read"><div><div class="dist" id="dist">–</div><div class="unit" id="unit"></div></div></div>
    </div>
    <div class="target-name masked" id="tname">• • •</div>
    <div class="target-sub" id="tsub"></div>
    <div class="insight-badge" id="ibadge"><span class="dot"></span> In sight</div>
    <div class="actions">
      <button class="btn secondary" id="addBtn">Log a spot</button>
      <button class="btn" id="mapBtn">Open in Maps</button>
    </div>
    <div class="status-line" id="status"></div>`;
  rose=$("rose"); needle=$("needle"); distEl=$("dist"); unitEl=$("unit");
  nameEl=$("tname"); subEl=$("tsub"); badgeEl=$("ibadge"); mapBtn=$("mapBtn");
  $("addBtn").onclick = openAddSheet;
  mapBtn.onclick = openInMaps;
}

function renderEnable(msg){
  wrap.innerHTML = `
    <div class="enable-card">
      <h2>Find the nearest shawarma</h2>
      <p>${msg || "This app needs your location and compass to point you toward the closest shawarma. Nothing leaves your phone."}</p>
      <button class="btn" id="enableBtn">Enable compass &amp; location</button>
    </div>
    <div class="status-line">Works best on a phone, opened over HTTPS, held flat.</div>`;
  $("enableBtn").onclick = enableSensors;
}

/* ============ sensors ============ */
async function enableSensors(){
  // orientation permission (iOS 13+)
  try {
    if(typeof DeviceOrientationEvent!=="undefined" && typeof DeviceOrientationEvent.requestPermission==="function"){
      const r = await DeviceOrientationEvent.requestPermission();
      if(r!=="granted"){ renderEnable("Compass permission was denied. You can still navigate by distance, but the needle won't turn."); }
    }
  } catch(e){ /* not iOS or blocked */ }

  startOrientation();

  if(!("geolocation" in navigator)){
    renderEnable("This browser has no location access, so the compass can't work here."); return;
  }
  renderCompassChrome();
  $("status").textContent = "Getting your location…";
  navigator.geolocation.watchPosition(onPos, onPosErr, { enableHighAccuracy:true, maximumAge:2000, timeout:15000 });
}

function startOrientation(){
  const handler = e => {
    let h=null;
    if(typeof e.webkitCompassHeading==="number" && !isNaN(e.webkitCompassHeading)){
      h = e.webkitCompassHeading;                    // iOS: already clockwise from north
    } else if(typeof e.alpha==="number" && e.alpha!==null){
      h = (360 - e.alpha) % 360;                     // android best-effort
    }
    if(h!=null){ state.heading = h; paintNeedle(); }
  };
  window.addEventListener("deviceorientationabsolute", handler, true);
  window.addEventListener("deviceorientation", handler, true);
}

function onPosErr(err){
  if(wrap.querySelector(".enable-card")) return;
  $("status").textContent = "Location unavailable ("+(err.message||"denied")+"). Check permissions and that you're on HTTPS.";
}

async function onPos(p){
  state.pos = { lat:p.coords.latitude, lon:p.coords.longitude, acc:p.coords.accuracy };
  if(!state.loaded && !state.fetching) loadSpots();
  recomputeTarget();
  paintNeedle();
}

/* ============ data ============ */
function overpassQuery(lat,lon){
  return `[out:json][timeout:25];(`+
    `node["cuisine"~"kebab|shawarma|shawerma|arab|lebanese|syrian|turkish",i](around:${SEARCH_RADIUS_M},${lat},${lon});`+
    `way["cuisine"~"kebab|shawarma|shawerma|arab|lebanese|syrian|turkish",i](around:${SEARCH_RADIUS_M},${lat},${lon});`+
    `node["amenity"="fast_food"](around:${SEARCH_RADIUS_M},${lat},${lon});`+
    `way["amenity"="fast_food"](around:${SEARCH_RADIUS_M},${lat},${lon});`+
    `);out center tags;`;
}

async function loadSpots(){
  state.fetching = true;
  const {lat,lon} = state.pos;
  const q = overpassQuery(lat,lon);
  let nodes = null;
  for(const url of OVERPASS){
    try {
      const ctrl = new AbortController();
      const to = setTimeout(()=>ctrl.abort(), 18000);
      const res = await fetch(url, { method:"POST", body:"data="+encodeURIComponent(q), signal:ctrl.signal });
      clearTimeout(to);
      if(!res.ok) continue;
      const data = await res.json();
      nodes = data.elements || [];
      break;
    } catch(e){ /* try next mirror */ }
  }
  state.fetching = false; state.loaded = true;

  if(nodes){
    const seen = new Set();
    const list = [];
    for(const el of nodes){
      const t = el.tags || {};
      const name = t.name || t["name:en"] || t["name:ar"];
      if(!name) continue;                            // skip unnamed
      const la = el.lat!=null ? el.lat : (el.center&&el.center.lat);
      const lo = el.lon!=null ? el.lon : (el.center&&el.center.lon);
      if(la==null||lo==null) continue;
      // prefer shawarma-ish, but keep fast_food too
      const cuisine = (t.cuisine||"").toLowerCase();
      const looksShawarma = /kebab|shawarma|shawerma|arab|lebanese|syrian|turkish/.test(cuisine) || /shawarma|shawerma|kebab/i.test(name);
      const key = name.toLowerCase()+"|"+la.toFixed(4)+"|"+lo.toFixed(4);
      if(seen.has(key)) continue; seen.add(key);
      list.push({ id:"osm_"+el.type+"_"+el.id, name, lat:la, lon:lo, source:"osm", shawarma:looksShawarma });
    }
    // shawarma-tagged first; if any exist, drop generic fast_food noise
    const sh = list.filter(x=>x.shawarma);
    state.candidates = (sh.length>=3 ? sh : list);
  } else {
    state.candidates = [];
  }
  // merge manual spots
  state.candidates = state.candidates.concat(state.manual);
  recomputeTarget();
  paintNeedle();

  const st = $("status");
  if(st){
    if(state.candidates.length===0)
      st.textContent = "Couldn't load any spots near you (OpenStreetMap may be thin here, or the request failed). Tap “Log a spot” to add one yourself.";
    else
      st.textContent = state.candidates.length+" spots nearby • pointing at the closest";
  }
}

function recomputeTarget(){
  if(!state.pos || state.candidates.length===0){ state.target=null; return; }
  let best=null, bd=Infinity;
  for(const c of state.candidates){
    const d = distM(state.pos.lat, state.pos.lon, c.lat, c.lon);
    if(d<bd){ bd=d; best=c; }
  }
  state.target = best ? Object.assign({}, best, { dist:bd }) : null;
}

/* ============ painting ============ */
function paintNeedle(){
  if(!rose) return;
  const h = state.heading || 0;
  rose.style.transform = `rotate(${-h}deg)`;

  if(!state.target || !state.pos){
    if(needle) needle.style.opacity = 0;
    distEl.textContent="–"; unitEl.textContent="";
    nameEl.className="target-name masked"; nameEl.textContent="• • •";
    subEl.textContent = state.loaded ? "no spot yet" : "loading…";
    mapBtn.disabled = true;
    return;
  }
  needle.style.opacity = 1;
  const brg = bearing(state.pos.lat, state.pos.lon, state.target.lat, state.target.lon);
  needle.style.transform = `rotate(${brg - h}deg)`;

  const [d,u] = fmtDist(state.target.dist);
  distEl.textContent = d; unitEl.textContent = u;

  const inSight = state.target.dist <= REVEAL_M;
  const known = !!state.visited[state.target.id];
  mapBtn.disabled = false;

  if(inSight || known){
    nameEl.className = "target-name"+(inSight?" insight":"");
    nameEl.textContent = state.target.name;
    subEl.textContent = inSight ? "You made it. Tap to rate it." : "visited before";
  } else {
    nameEl.className = "target-name masked";
    nameEl.textContent = "• • •";
    subEl.textContent = "name unlocks when it's in sight";
  }
  badgeEl.classList.toggle("show", inSight);

  if(inSight && !known) checkIn(state.target);
  if(inSight) { nameEl.style.cursor="pointer"; nameEl.onclick=()=>openReviewSheet(state.target); }
  else { nameEl.onclick=null; nameEl.style.cursor="default"; }
}

/* ============ check-in / achievements ============ */
function checkIn(t){
  state.visited[t.id] = { name:t.name, lat:t.lat, lon:t.lon, ts:Date.now() };
  Store.set("visited", state.visited);
  toast("Reached "+t.name+" 🎉");
  evalAchievements();
  setTimeout(()=>openReviewSheet(t), 700);
}

function openInMaps(){
  if(!state.target) return;
  // coordinates only — the link itself carries no name (the map will still show the place pin)
  const u = `https://www.google.com/maps?q=${state.target.lat},${state.target.lon}`;
  window.open(u, "_blank", "noopener");
}

/* ============ sheets ============ */
const sheet=$("sheet"), sheetBg=$("sheet-bg");
function showSheet(html){ sheet.innerHTML='<div class="grabber"></div>'+html; sheetBg.classList.add("show"); sheet.classList.add("show"); }
function hideSheet(){ sheetBg.classList.remove("show"); sheet.classList.remove("show"); }
sheetBg.onclick = hideSheet;

let pendingStars=0;
function openReviewSheet(t){
  const existing = state.reviews[t.id] || {stars:0,text:""};
  pendingStars = existing.stars;
  showSheet(`
    <h3>${t.name}</h3>
    <div class="sh-sub">How was the shawarma?</div>
    <div class="rate" id="rate">${[1,2,3,4,5].map(n=>`<span data-n="${n}">★</span>`).join("")}</div>
    <textarea id="rtext" placeholder="Notes… garlic sauce situation, bread, value, the works.">${existing.text||""}</textarea>
    <button class="btn" id="saveR" style="margin-top:16px;width:100%">Save review</button>
  `);
  const paint=()=>document.querySelectorAll("#rate span").forEach(s=>s.classList.toggle("lit", +s.dataset.n<=pendingStars));
  paint();
  document.querySelectorAll("#rate span").forEach(s=> s.onclick=()=>{ pendingStars=+s.dataset.n; paint(); });
  $("saveR").onclick=()=>{
    if(pendingStars===0){ toast("Pick a star rating first"); return; }
    state.reviews[t.id] = { stars:pendingStars, text:$("rtext").value.trim(), ts:Date.now(), name:t.name };
    Store.set("reviews", state.reviews);
    // ensure it's marked visited even if logged manually
    if(!state.visited[t.id]){ state.visited[t.id]={name:t.name,lat:t.lat,lon:t.lon,ts:Date.now()}; Store.set("visited",state.visited); }
    hideSheet(); toast("Review saved"); evalAchievements(); renderVisited();
  };
}

function openAddSheet(){
  if(!state.pos){ toast("Need your location first"); return; }
  showSheet(`
    <h3>Log a spot</h3>
    <div class="sh-sub">Adds a shop at your current location (${state.pos.lat.toFixed(4)}, ${state.pos.lon.toFixed(4)}).</div>
    <label class="fld">Shop name</label>
    <input type="text" id="mname" placeholder="e.g. Aleppo Shawarma" autocomplete="off">
    <button class="btn" id="saveM" style="width:100%">Add &amp; mark visited</button>
  `);
  $("saveM").onclick=()=>{
    const name=$("mname").value.trim();
    if(!name){ toast("Give it a name"); return; }
    const spot={ id:"manual_"+Date.now(), name, lat:state.pos.lat, lon:state.pos.lon, source:"manual" };
    state.manual.push(spot); Store.set("manual", state.manual);
    state.candidates.push(spot);
    state.visited[spot.id]={name,lat:spot.lat,lon:spot.lon,ts:Date.now()}; Store.set("visited",state.visited);
    recomputeTarget(); paintNeedle(); evalAchievements();
    hideSheet(); toast("Added "+name);
    setTimeout(()=>openReviewSheet(spot), 500);
  };
}

/* ============ achievements ============ */
const ACHIEVEMENTS = [
  { id:"first",  ic:"🥙", name:"First Bite",       desc:"Visit 1 spot",        test:s=>nVisited(s)>=1 },
  { id:"five",   ic:"🔥", name:"Regular",          desc:"Visit 5 spots",       test:s=>nVisited(s)>=5 },
  { id:"ten",    ic:"⭐", name:"Connoisseur",       desc:"Visit 10 spots",      test:s=>nVisited(s)>=10 },
  { id:"tf",     ic:"👑", name:"Sommelier",        desc:"Visit 25 spots",      test:s=>nVisited(s)>=25 },
  { id:"rev1",   ic:"✍️", name:"First Word",       desc:"Write 1 review",      test:s=>nReviews(s)>=1 },
  { id:"rev5",   ic:"📣", name:"Critic",           desc:"Write 5 reviews",     test:s=>nReviews(s)>=5 },
  { id:"five5",  ic:"💯", name:"Five-Star Friend", desc:"Rate one 5 stars",    test:s=>Object.values(s.reviews).some(r=>r.stars===5) },
  { id:"harsh",  ic:"🧊", name:"Tough Crowd",      desc:"Rate one ≤2 stars",   test:s=>Object.values(s.reviews).some(r=>r.stars>0&&r.stars<=2) },
  { id:"night",  ic:"🌙", name:"Night Shift",      desc:"Check in 10pm–4am",   test:s=>Object.values(s.visited).some(v=>{const h=new Date(v.ts).getHours(); return h>=22||h<4;}) },
];
const nVisited = s => Object.keys(s.visited).length;
const nReviews = s => Object.keys(s.reviews).length;

function evalAchievements(){
  const had = Store.get("achv", {});
  let changed=false;
  for(const a of ACHIEVEMENTS){
    const on = a.test(state);
    if(on && !had[a.id]){ had[a.id]=Date.now(); changed=true; toast("Award unlocked: "+a.name+" "+a.ic); }
  }
  if(changed) Store.set("achv", had);
  renderAwards();
}

/* ============ renders ============ */
function renderVisited(){
  const ids = Object.keys(state.visited).sort((a,b)=>state.visited[b].ts-state.visited[a].ts);
  const el = $("visited-list");
  if(ids.length===0){ el.innerHTML=`<div class="empty"><div class="big">🧭</div>No shawarma logged yet.<br>Get within sight of one and it shows up here.</div>`; return; }
  let rows="";
  for(const id of ids){
    const v=state.visited[id], r=state.reviews[id];
    const stars = r ? "★".repeat(r.stars)+"☆".repeat(5-r.stars) : "Tap to review";
    const d = new Date(v.ts).toLocaleDateString(undefined,{month:"short",day:"numeric"});
    rows+=`<div class="row" data-id="${id}">
      <div class="leading">🥙</div>
      <div class="body"><div class="t">${v.name}</div><div class="s ${r?'stars':''}">${stars}</div></div>
      <div class="trail">${d}</div></div>`;
  }
  el.innerHTML=`<div class="group">${rows}</div>`;
  el.querySelectorAll(".row").forEach(row=>{
    row.onclick=()=>{ const id=row.dataset.id, v=state.visited[id]; openReviewSheet({id,name:v.name,lat:v.lat,lon:v.lon}); };
  });
}

function renderAwards(){
  const had = Store.get("achv", {});
  $("badges").innerHTML = ACHIEVEMENTS.map(a=>{
    const on = !!had[a.id];
    return `<div class="badge ${on?'on':''}"><div class="ic">${a.ic}</div><div class="name">${a.name}</div><div class="desc">${a.desc}</div></div>`;
  }).join("");
  const n = Object.keys(had).length;
  $("awards-count").textContent = n+" of "+ACHIEVEMENTS.length+" unlocked";
}

/* ============ toast ============ */
let toastT;
function toast(msg){ const t=$("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),2600); }

/* ============ tabs ============ */
document.querySelectorAll(".tab").forEach(tab=>{
  tab.onclick=()=>{
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
    tab.classList.add("active");
    $("view-"+tab.dataset.view).classList.add("active");
    if(tab.dataset.view==="visited") renderVisited();
    if(tab.dataset.view==="awards") renderAwards();
  };
});

/* ============ boot ============ */
renderEnable();
renderVisited();
renderAwards();
evalAchievements();
</script>
</body>
</html>
